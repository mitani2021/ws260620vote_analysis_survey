```html
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミタニ市長選挙 集計結果</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1 { font-size: 28px; }

    h2 {
      margin-top: 40px;
      border-left: 8px solid #1a73e8;
      padding-left: 12px;
      font-size: 24px;
    }

    h3 {
      margin-top: 28px;
      font-size: 19px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .refresh {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #1a73e8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 14px;
      margin-top: 18px;
    }

    .candidate-card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      background: #fafafa;
    }

    .candidate-name {
      font-size: 20px;
      font-weight: bold;
      margin-bottom: 8px;
    }

    .candidate-votes {
      font-size: 30px;
      font-weight: bold;
    }

    .ranking-block {
      margin-top: 18px;
      padding: 16px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    .ranking-title {
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 17px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 220px 1fr 60px;
      gap: 10px;
      align-items: center;
      margin: 10px 0;
    }

    .rank-label {
      font-size: 15px;
    }

    .bar-wrap {
      background: #e5e5e5;
      border-radius: 999px;
      overflow: hidden;
      height: 24px;
    }

    .bar {
      height: 100%;
      border-radius: 999px;
      min-width: 0;
    }

    .rank-value {
      text-align: right;
      font-weight: bold;
    }

    .candidate-k { background: #1a73e8; }
    .candidate-f { background: #e8710a; }
    .candidate-h { background: #188038; }

    .note {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 12px;
    }

    table {
      border-collapse: collapse;
      width: 100%;
      min-width: 720px;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: center;
      white-space: nowrap;
    }

    th { background: #eef3fb; }

    @media (max-width: 700px) {
      body { padding: 10px; }
      .container { padding: 14px; }
      h1 { font-size: 23px; }
      h2 { font-size: 20px; }

      .summary {
        grid-template-columns: 1fr;
      }

      .rank-row {
        grid-template-columns: 130px 1fr 42px;
      }

      .rank-label {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ミタニ市長選挙 集計結果</h1>
    <p id="count">読み込み中...</p>
    <button class="refresh" onclick="location.reload()">再読み込み</button>

    <h2>候補者別得票数</h2>
    <div id="voteResult"></div>

    <h2>候補者ごとの「重視した要素」ランキング</h2>
    <p class="note">複数選択された「重視した要素」を、候補者ごとに集計しています。</p>
    <div id="factorByCandidateResult"></div>

    <h2>候補者ごとの「特に重視した要素」ランキング</h2>
    <p class="note">投票の最後の決め手になった要素を、候補者ごとに集計しています。</p>
    <div id="mainFactorByCandidateResult"></div>

    <h2>怪しい情報の信用度 × 投票先</h2>
    <div id="conspiracyResult"></div>

    <h2>ファクトチェック閲覧 × 投票先</h2>
    <div id="factcheckResult"></div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXw2xq4BOvLZY5pkyiEyE03gldKZmVAuaTQ1OkgpV8r3M_V1ouYJwwJkE1FTwxD6pNpg/exec';

    const candidates = ['神崎カオル', '風間ショウ', '姫島ルイ'];

    const candidateClass = {
      '神崎カオル': 'candidate-k',
      '風間ショウ': 'candidate-f',
      '姫島ルイ': 'candidate-h'
    };

    const factors = [
      '候補者のプロフィール',
      '候補者の見た目・印象',
      '候補者の政策',
      'SNSの動画',
      '新聞記事・ファクトチェック',
      '友人との会話',
      'その他'
    ];

    function getField(row, names) {
      for (const name of names) {
        if (row[name] !== undefined && row[name] !== null && row[name] !== '') {
          return row[name];
        }
      }
      return '';
    }

    function loadData() {
      const callbackName = 'callback_' + Date.now();

      window[callbackName] = function(data) {
        render(data);
        delete window[callbackName];
      };

      const script = document.createElement('script');
      script.src = SCRIPT_URL + '?callback=' + callbackName;
      document.body.appendChild(script);
    }

    function countBy(data, extractor) {
      const result = {};
      data.forEach(row => {
        const value = extractor(row) || '未回答';
        result[value] = (result[value] || 0) + 1;
      });
      return result;
    }

    function makeCandidateItemTable(data, itemValues, extractor) {
      const table = {};

      candidates.forEach(candidate => {
        table[candidate] = {};
        itemValues.forEach(item => {
          table[candidate][item] = 0;
        });
      });

      data.forEach(row => {
        const candidate = getField(row, ['投票先', 'vote']);
        if (!table[candidate]) return;

        const values = extractor(row);
        values.forEach(value => {
          if (table[candidate][value] !== undefined) {
            table[candidate][value]++;
          }
        });
      });

      return table;
    }

    function renderVoteCards(voteCounts) {
      let html = '<div class="summary">';

      candidates.forEach(candidate => {
        const votes = voteCounts[candidate] || 0;
        html += `
          <div class="candidate-card">
            <div class="candidate-name">${candidate}</div>
            <div class="candidate-votes">${votes}票</div>
          </div>
        `;
      });

      html += '</div>';
      return html;
    }

    function renderRankingBlock(title, obj, barClass) {
      const entries = Object.entries(obj).sort((a, b) => b[1] - a[1]);
      const max = Math.max(...entries.map(e => e[1]), 1);

      let html = '<div class="ranking-block">';
      html += `<div class="ranking-title">${title}</div>`;

      entries.forEach(([label, value], index) => {
        const width = value === 0 ? 0 : Math.max((value / max) * 100, 4);
        html += `
          <div class="rank-row">
            <div class="rank-label">${index + 1}位　${label}</div>
            <div class="bar-wrap">
              <div class="bar ${barClass}" style="width:${width}%"></div>
            </div>
            <div class="rank-value">${value}</div>
          </div>
        `;
      });

      html += '</div>';
      return html;
    }

    function renderFactorByCandidate(table, titlePrefix) {
      let html = '';

      candidates.forEach(candidate => {
        const obj = {};
        factors.forEach(factor => {
          obj[factor] = table[candidate][factor] || 0;
        });

        html += renderRankingBlock(
          `${candidate}に投票した人の${titlePrefix}`,
          obj,
          candidateClass[candidate]
        );
      });

      return html;
    }

    function renderCrossTable(table, rowValues, colValues) {
      let html = '<div class="table-wrap"><table>';
      html += '<tr><th>投票先</th>';

      colValues.forEach(col => {
        html += `<th>${col}</th>`;
      });

      html += '</tr>';

      rowValues.forEach(candidate => {
        html += `<tr><th>${candidate}</th>`;
        colValues.forEach(col => {
          html += `<td>${table[candidate][col] || 0}</td>`;
        });
        html += '</tr>';
      });

      html += '</table></div>';
      return html;
    }

    function renderItemRankingByCandidate(table, itemValues, titlePrefix) {
      let html = '';

      itemValues.forEach(item => {
        const obj = {};
        candidates.forEach(candidate => {
          obj[candidate] = table[candidate][item] || 0;
        });

        html += renderRankingBlock(
          `${titlePrefix}：${item}`,
          obj,
          ''
        );
      });

      return html;
    }

    function render(data) {
      document.getElementById('count').textContent = `回答数：${data.length}件`;

      const voteCounts = countBy(data, row => getField(row, ['投票先', 'vote']));
      document.getElementById('voteResult').innerHTML = renderVoteCards(voteCounts);

      const factorTable = makeCandidateItemTable(data, factors, row => {
        return String(getField(row, ['重視した情報', 'factors']) || '')
          .split(',')
          .map(s => s.trim())
          .filter(Boolean);
      });

      document.getElementById('factorByCandidateResult').innerHTML =
        renderFactorByCandidate(factorTable, '重視した要素ランキング');

      const mainFactorTable = makeCandidateItemTable(data, factors, row => {
        const value = getField(row, ['特に重視した要素', 'mainFactor']);
        return value ? [String(value).trim()] : [];
      });

      document.getElementById('mainFactorByCandidateResult').innerHTML =
        renderFactorByCandidate(mainFactorTable, '特に重視した要素ランキング');

      const conspiracyLevels = [
        'とても信用した',
        'ある程度信用した',
        'どちらともいえない',
        'あまり信用しなかった',
        'まったく信用しなかった'
      ];

      const conspiracyTable = makeCandidateItemTable(data, conspiracyLevels, row => {
        const value = getField(row, ['陰謀論信用度', 'conspiracy']);
        return value ? [String(value).trim()] : [];
      });

      document.getElementById('conspiracyResult').innerHTML =
        renderCrossTable(conspiracyTable, candidates, conspiracyLevels) +
        renderItemRankingByCandidate(conspiracyTable, conspiracyLevels, '怪しい情報の信用度');

      const factcheckViewed = ['見た', '見ていない'];

      const factcheckTable = makeCandidateItemTable(data, factcheckViewed, row => {
        const value = getField(row, ['ファクトチェック閲覧', 'factcheckViewed']);
        return value ? [String(value).trim()] : [];
      });

      document.getElementById('factcheckResult').innerHTML =
        renderCrossTable(factcheckTable, candidates, factcheckViewed) +
        renderItemRankingByCandidate(factcheckTable, factcheckViewed, 'ファクトチェック閲覧');
    }

    loadData();
  </script>
</body>
</html>
