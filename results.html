```html
<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ミタニ市長選挙 集計結果</title>
  <style>
    * { box-sizing: border-box; }

    body {
      font-family: system-ui, sans-serif;
      background: #f4f6f8;
      margin: 0;
      padding: 20px;
      color: #222;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 24px;
      border-radius: 14px;
      box-shadow: 0 4px 16px rgba(0,0,0,0.08);
    }

    h1 { font-size: 28px; }

    h2 {
      margin-top: 40px;
      border-left: 8px solid #1a73e8;
      padding-left: 12px;
      font-size: 24px;
    }

    h3 {
      margin-top: 28px;
      font-size: 19px;
      border-bottom: 1px solid #ddd;
      padding-bottom: 6px;
    }

    .refresh {
      margin-top: 20px;
      padding: 12px 20px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      background: #1a73e8;
      color: white;
      font-weight: bold;
      cursor: pointer;
    }

    .ranking-block {
      margin-top: 18px;
      padding: 16px;
      background: #fafafa;
      border: 1px solid #ddd;
      border-radius: 10px;
    }

    .ranking-title {
      font-weight: bold;
      margin-bottom: 12px;
      font-size: 17px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 220px 1fr 60px;
      gap: 10px;
      align-items: center;
      margin: 10px 0;
    }

    .rank-label { font-size: 15px; }

    .bar-wrap {
      background: #e5e5e5;
      border-radius: 999px;
      overflow: hidden;
      height: 24px;
    }

    .bar {
      height: 100%;
      border-radius: 999px;
      background: #1a73e8;
    }

    .rank-value {
      text-align: right;
      font-weight: bold;
    }

    .candidate-k { background: #1a73e8; }
    .candidate-f { background: #e8710a; }
    .candidate-h { background: #188038; }

    .note {
      color: #666;
      font-size: 14px;
      margin-top: 8px;
    }

    @media (max-width: 700px) {
      body { padding: 10px; }
      .container { padding: 14px; }
      h1 { font-size: 23px; }
      h2 { font-size: 20px; }

      .rank-row {
        grid-template-columns: 140px 1fr 44px;
      }

      .rank-label {
        font-size: 13px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>ミタニ市長選挙 集計結果</h1>
    <p id="count">読み込み中...</p>
    <button class="refresh" onclick="location.reload()">再読み込み</button>

    <h2>候補者別得票数</h2>
    <div id="voteResult"></div>

    <h2>候補者ごとの「重視した要素」ランキング</h2>
    <p class="note">複数選択された要素を、候補者ごとに集計しています。</p>
    <div id="factorResult"></div>

    <h2>候補者ごとの「特に重視した要素」ランキング</h2>
    <p class="note">投票判断の決め手になった要素を、候補者ごとに集計しています。</p>
    <div id="mainFactorResult"></div>

    <h2>怪しい情報の信用度 × 投票先</h2>
    <div id="conspiracyResult"></div>

    <h2>ファクトチェック閲覧 × 投票先</h2>
    <div id="factcheckResult"></div>
  </div>

  <script>
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXw2xq4BOvLZY5pkyiEyE03gldKZmVAuaTQ1OkgpV8r3M_V1ouYJwwJkE1FTwxD6pNpg/exec';

    const candidates = ['神崎カオル', '風間ショウ', '姫島ルイ'];

    const candidateClass = {
      '神崎カオル': 'candidate-k',
      '風間ショウ': 'candidate-f',
      '姫島ルイ': 'candidate-h'
    };

    const factors = [
      '候補者のプロフィール',
      '候補者の見た目・印象',
      '候補者の政策',
      '質疑応答での受け答え',
      'SNSの動画',
      '新聞記事・ファクトチェック',
      '友人との会話',
      'その他'
    ];

    function getField(row, names) {
      for (const name of names) {
        if (row[name] !== undefined && row[name] !== null && row[name] !== '') {
          return row[name];
        }
      }
      return '';
    }

    function loadData() {
      const callbackName = 'callback_' + Date.now();

      window[callbackName] = function(data) {
        render(data);
        delete window[callbackName];
      };

      const script = document.createElement('script');
      script.src = SCRIPT_URL + '?callback=' + callbackName;
      document.body.appendChild(script);
    }

    function makeCandidateTable(data, itemValues, extractor) {
      const table = {};

      candidates.forEach(candidate => {
        table[candidate] = {};
        itemValues.forEach(item => {
          table[candidate][item] = 0;
        });
      });

      data.forEach(row => {
        const candidate = getField(row, ['投票先', 'vote']);
        if (!table[candidate]) return;

        const values = extractor(row);
        values.forEach(value => {
          if (table[candidate][value] !== undefined) {
            table[candidate][value]++;
          }
        });
      });

      return table;
    }

    function renderRankingBlock(title, obj, barClassGetter) {
      const entries = Object.entries(obj).sort((a, b) => b[1] - a[1]);
      const max = Math.max(...entries.map(e => e[1]), 1);

      let html = `<div class="ranking-block">`;
      html += `<div class="ranking-title">${title}</div>`;

      entries.forEach(([label, value], index) => {
        const width = value === 0 ? 0 : Math.max((value / max) * 100, 4);
        const barClass = typeof barClassGetter === 'function' ? barClassGetter(label) : '';

        html += `
          <div class="rank-row">
            <div class="rank-label">${index + 1}位　${label}</div>
            <div class="bar-wrap">
              <div class="bar ${barClass}" style="width:${width}%"></div>
            </div>
            <div class="rank-value">${value}</div>
          </div>
        `;
      });

      html += `</div>`;
      return html;
    }

    function renderVoteRanking(data) {
      const counts = {};
      candidates.forEach(c => counts[c] = 0);

      data.forEach(row => {
        const vote = getField(row, ['投票先', 'vote']);
        if (counts[vote] !== undefined) counts[vote]++;
      });

      return renderRankingBlock('候補者別得票数', counts, label => candidateClass[label]);
    }

    function renderCandidateFactorRanking(table, titleSuffix) {
      let html = '';

      candidates.forEach(candidate => {
        const obj = {};
        factors.forEach(factor => {
          obj[factor] = table[candidate][factor] || 0;
        });

        html += renderRankingBlock(
          `${candidate}に投票した人の${titleSuffix}`,
          obj,
          () => candidateClass[candidate]
        );
      });

      return html;
    }

    function renderItemCandidateRanking(table, itemValues, titlePrefix) {
      let html = '';

      itemValues.forEach(item => {
        const obj = {};
        candidates.forEach(candidate => {
          obj[candidate] = table[candidate][item] || 0;
        });

        html += renderRankingBlock(
          `${titlePrefix}：${item}`,
          obj,
          label => candidateClass[label]
        );
      });

      return html;
    }

    function render(data) {
      document.getElementById('count').textContent = `回答数：${data.length}件`;

      document.getElementById('voteResult').innerHTML = renderVoteRanking(data);

      const factorTable = makeCandidateTable(data, factors, row => {
        return String(getField(row, ['重視した情報', 'factors']) || '')
          .split(',')
          .map(s => s.trim())
          .filter(Boolean);
      });

      document.getElementById('factorResult').innerHTML =
        renderCandidateFactorRanking(factorTable, '重視した要素ランキング');

      const mainFactorTable = makeCandidateTable(data, factors, row => {
        const value = getField(row, ['特に重視した要素', 'mainFactor']);
        return value ? [String(value).trim()] : [];
      });

      document.getElementById('mainFactorResult').innerHTML =
        renderCandidateFactorRanking(mainFactorTable, '特に重視した要素ランキング');

      const conspiracyLevels = [
        'とても信用した',
        'ある程度信用した',
        'どちらともいえない',
        'あまり信用しなかった',
        'まったく信用しなかった'
      ];

      const conspiracyTable = makeCandidateTable(data, conspiracyLevels, row => {
        const value = getField(row, ['陰謀論信用度', 'conspiracy']);
        return value ? [String(value).trim()] : [];
      });

      document.getElementById('conspiracyResult').innerHTML =
        renderItemCandidateRanking(conspiracyTable, conspiracyLevels, '怪しい情報の信用度');

      const factcheckViewed = [
        '見た',
        '見ていない'
      ];

      const factcheckTable = makeCandidateTable(data, factcheckViewed, row => {
        const value = getField(row, ['ファクトチェック閲覧', 'factcheckViewed']);
        return value ? [String(value).trim()] : [];
      });

      document.getElementById('factcheckResult').innerHTML =
        renderItemCandidateRanking(factcheckTable, factcheckViewed, 'ファクトチェック閲覧');
    }

    loadData();
  </script>
</body>
</html>
